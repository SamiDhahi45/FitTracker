version: "3.8"

services:
  mongo:
    image: mongo:6
    container_name: fittrack-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - fittrack-network

  server:
    build: ./server
    container_name: fittrack-server
    ports:
      - "3001:3001"
    environment:
      - MONGO_URI=mongodb://mongo:27017/fittrackDb
    depends_on:
      - mongo
    networks:
      - fittrack-network

  client:
    build: ./client
    container_name: fittrack-client
    ports:
      - "3000:3000"
    depends_on:
      - server
    networks:
      - fittrack-network

volumes:
  mongo-data:

networks:
  fittrack-network:
    driver: bridge
